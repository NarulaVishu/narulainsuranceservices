<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Thank You | Narula Insurance</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-50 to-blue-100 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-2xl rounded-3xl p-10 max-w-md w-full text-center">

    <!-- Success Icon -->
    <div class="flex justify-center mb-6">
      <div class="bg-green-100 p-4 rounded-full">
        <svg class="w-12 h-12 text-green-600" fill="none" stroke="currentColor"
          viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M5 13l4 4L19 7"></path>
        </svg>
      </div>
    </div>

    <!-- Heading -->
    <h1 class="text-3xl font-bold text-slate-800 mb-4">
      Thank You!
    </h1>

    <!-- Message -->
    <p class="text-slate-600 mb-6 leading-relaxed">
      Your enquiry has been successfully submitted.<br>
      Our team at <span class="font-semibold text-blue-600">Narula Insurance Services</span> 
      will contact you shortly.
    </p>

    <!-- Button -->
    <a href="index.html"
      class="inline-block bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-3 rounded-xl transition duration-300 shadow-md">
      Go Back to Website
    </a>

  </div>

</body>
</html>
